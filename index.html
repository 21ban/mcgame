<!doctype html>
<html lang="zh-CN">

  <title>体素沙盒 - 完整合并版</title>
  <style>
    html, body {

<body>
  <div id="hud">
    <div><b>体素沙盒完整合并版</b></div>
    <div>左键：破坏方块</div>
    <div>右键：放置方块</div>
    <div>WASD：移动，空格：跳跃</div>
    <div>E：打开/关闭背包</div>
    <div>1-9：切换快捷栏</div>
    <div>当前：<span id="currentSlotInfo">-</span></div>
    <div>背包占用：<span id="inventoryInfo">0/27</span></div>
  </div>

  <div id="crosshair">+</div>
  <div id="start">点击进入游戏</div>

  <div id="hotbar"></div>

  <div id="inventoryPanel">
    <div class="title">Inventory</div>
    <div class="subtitle">拖拽交换；相同物品会自动堆叠，最大 64 个</div>
    <div class="subtitle">Hotbar</div>
    <div id="inventoryHotbar" class="grid"></div>
    <div class="subtitle">Inventory</div>
    <div id="inventoryGrid" class="grid"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    // =========================
    // 基础场景
    // =========================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 18, 120);

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 10, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);
    renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

    scene.add(new THREE.AmbientLight(0xffffff, 0.72));

    const sun = new THREE.DirectionalLight(0xffffff, 1.15);
    sun.position.set(30, 50, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 120;
    sun.shadow.camera.left = -40;
    sun.shadow.camera.right = 40;
    sun.shadow.camera.top = 40;
    sun.shadow.camera.bottom = -40;
    scene.add(sun);

    // =========================
    // 天空穹顶 / 太阳
    // =========================
    const skyDome = new THREE.Mesh(
      new THREE.SphereGeometry(500, 32, 16),
      new THREE.ShaderMaterial({
        side: THREE.BackSide,
        uniforms: {
          topColor: { value: new THREE.Color(0x87ceeb) },
          bottomColor: { value: new THREE.Color(0xdff4ff) }
        },
        vertexShader: `
          varying vec3 vWorldPosition;
          void main() {
            vec4 worldPosition = modelMatrix * vec4(position, 1.0);
            vWorldPosition = worldPosition.xyz;
            gl_Position = projectionMatrix * viewMatrix * worldPosition;
          }
        `,
        fragmentShader: `
          uniform vec3 topColor;
          uniform vec3 bottomColor;
          varying vec3 vWorldPosition;
          void main() {
            float h = normalize(vWorldPosition).y * 0.5 + 0.5;
            h = pow(h, 0.75);
            gl_FragColor = vec4(mix(bottomColor, topColor, h), 1.0);
          }
        `
      })
    );
    scene.add(skyDome);

    const sunMesh = new THREE.Mesh(
      new THREE.SphereGeometry(4, 24, 16),
      new THREE.MeshBasicMaterial({ color: 0xfff2b0 })
    );
    sunMesh.position.set(60, 80, -40);
    scene.add(sunMesh);

    // =========================
    // 体素材质
    // =========================
    const materials = {
      grass: new THREE.MeshStandardMaterial({ color: 0x5dbb63, roughness: 1, metalness: 0 }),
      dirt: new THREE.MeshStandardMaterial({ color: 0x8b6b3f, roughness: 1, metalness: 0 }),
      stone: new THREE.MeshStandardMaterial({ color: 0x8f8f8f, roughness: 1, metalness: 0 }),
      wood: new THREE.MeshStandardMaterial({ color: 0x8a5a33, roughness: 1, metalness: 0 }),
      leaf: new THREE.MeshStandardMaterial({
        color: 0x3d8f3d,
        roughness: 1,
        transparent: true,
        opacity: 0.88,
        depthWrite: false
      })
    };

    const BLOCK_TYPES = ['grass', 'dirt', 'stone', 'wood', 'leaf'];
    const STACK_LIMIT = 64;

    // =========================
    // 背包系统
    // =========================
    const SAVE_KEY = 'voxel_sandbox_save_full_combined_v1';
    const HOTBAR_SIZE = 9;
    const INVENTORY_SIZE = 27;

    function emptySlot() {
      return { type: null, count: 0 };
    }

    let hotbar = Array.from({ length: HOTBAR_SIZE }, () => emptySlot());
    let inventory = Array.from({ length: INVENTORY_SIZE }, () => emptySlot());
    let selectedSlot = 0;

    function cloneSlot(slot) {
      return { type: slot.type, count: slot.count };
    }

    function normalizeSlot(slot) {
      if (!slot || slot.count <= 0 || !slot.type) {
        return emptySlot();
      }
      return { type: slot.type, count: slot.count };
    }

    function ensureStarterItems() {
      const hasAny = hotbar.some(s => s.type);
      if (!hasAny) {
        hotbar[0] = { type: 'grass', count: 32 };
        hotbar[1] = { type: 'dirt', count: 32 };
        hotbar[2] = { type: 'stone', count: 32 };
      }
    }

    function occupiedCount(arr) {
      return arr.filter(s => s.type && s.count > 0).length;
    }

    function addItem(type, count = 1) {
      while (count > 0) {
        const cur = hotbar[selectedSlot];
        if ((!cur.type || cur.type === type) && cur.count < STACK_LIMIT) {
          cur.type = type;
          const add = Math.min(count, STACK_LIMIT - cur.count);
          cur.count += add;
          count -= add;
          continue;
        }

        let slot = hotbar.find((s, i) => i !== selectedSlot && s.type === type && s.count < STACK_LIMIT);
        if (slot) {
          const add = Math.min(count, STACK_LIMIT - slot.count);
          slot.count += add;
          count -= add;
          continue;
        }

        slot = inventory.find(s => s.type === type && s.count < STACK_LIMIT);
        if (slot) {
          const add = Math.min(count, STACK_LIMIT - slot.count);
          slot.count += add;
          count -= add;
          continue;
        }

        slot = hotbar.find((s, i) => i !== selectedSlot && !s.type);
        if (slot) {
          const add = Math.min(count, STACK_LIMIT);
          slot.type = type;
          slot.count = add;
          count -= add;
          continue;
        }

        slot = inventory.find(s => !s.type);
        if (slot) {
          const add = Math.min(count, STACK_LIMIT);
          slot.type = type;
          slot.count = add;
          count -= add;
          continue;
        }

        return false;
      }
      return true;
    }

    function consumeSelectedItem() {
      const slot = hotbar[selectedSlot];
      if (!slot.type || slot.count <= 0) return null;

      const type = slot.type;
      slot.count -= 1;
      if (slot.count <= 0) {
        slot.type = null;
        slot.count = 0;
      }
      return type;
    }

    function selectedItemType() {
      return hotbar[selectedSlot]?.type || null;
    }

    function getSlot(section, index) {
      return section === 'hotbar' ? hotbar[index] : inventory[index];
    }

    function setSlot(section, index, slot) {
      if (section === 'hotbar') hotbar[index] = normalizeSlot(slot);
      else inventory[index] = normalizeSlot(slot);
    }

    function moveSlot(from, to) {
      if (from.section === to.section && from.index === to.index) return;

      const source = getSlot(from.section, from.index);
      const target = getSlot(to.section, to.index);
      if (!source.type || source.count <= 0) return;

      if (target.type && target.type === source.type) {
        const space = STACK_LIMIT - target.count;
        if (space <= 0) return;

        const moved = Math.min(space, source.count);
        target.count += moved;
        source.count -= moved;

        if (source.count <= 0) {
          source.type = null;
          source.count = 0;
        }
        return;
      }

      if (!target.type) {
        setSlot(to.section, to.index, cloneSlot(source));
        setSlot(from.section, from.index, emptySlot());
        return;
      }

      const temp = cloneSlot(source);
      setSlot(from.section, from.index, cloneSlot(target));
      setSlot(to.section, to.index, temp);
    }

    // =========================
    // 世界 / Chunk / 面剔除
    // =========================
    const CHUNK_SIZE = 16;
    const LOAD_RADIUS = 2;
    const MAX_BUILD_HEIGHT = 32;
    const WORLD_EDIT = new Map();
    const loadedChunks = new Map();
    const raycaster = new THREE.Raycaster();

    function key3(x, y, z) {
      return `${x}|${y}|${z}`;
    }

    function chunkKey(cx, cz) {
      return `${cx}|${cz}`;
    }

    function blockToChunkCoord(x, z) {
      return {
        cx: Math.floor(x / CHUNK_SIZE),
        cz: Math.floor(z / CHUNK_SIZE)
      };
    }

    function terrainHeight(x, z) {
      const n =
        Math.sin(x * 0.18) * 1.6 +
        Math.cos(z * 0.2) * 1.3 +
        Math.sin((x + z) * 0.11) * 0.9;

      return Math.max(2, Math.min(8, Math.floor(4 + n)));
    }

    function baseTypeAt(x, y, z) {
      const h = terrainHeight(x, z);
      if (y > h) return null;
      if (y === h) return 'grass';
      if (y >= h - 2) return 'dirt';
      return 'stone';
    }

    function hash2(x, z, seed = 0) {
      const n = Math.sin(x * 127.1 + z * 311.7 + seed * 74.7) * 43758.5453;
      return n - Math.floor(n);
    }

    function treeRootAt(x, z) {
      if (terrainHeight(x, z) < 4) return false;
      return hash2(x, z, 1) < 0.045;
    }

    function treeHeightAt(x, z) {
      return 4 + Math.floor(hash2(x, z, 2) * 3);
    }

    function treeBlockAt(x, y, z) {
      for (let dx = -2; dx <= 2; dx++) {
        for (let dz = -2; dz <= 2; dz++) {
          const rx = x - dx;
          const rz = z - dz;

          if (!treeRootAt(rx, rz)) continue;

          const baseY = terrainHeight(rx, rz);
          const h = treeHeightAt(rx, rz);
          const trunkTop = baseY + h;

          // 树干
          if (x === rx && z === rz && y > baseY && y <= trunkTop) {
            return 'wood';
          }

          // 树冠
          const dy = y - trunkTop;
          const dist2 = dx * dx + dz * dz + dy * dy;
          if (y >= trunkTop - 1 && y <= trunkTop + 2 && dist2 <= 6.5) {
            return 'leaf';
          }
        }
      }
      return null;
    }

    function getBlockType(x, y, z) {
      const k = key3(x, y, z);
      if (WORLD_EDIT.has(k)) return WORLD_EDIT.get(k); // null 表示空气

      const tree = treeBlockAt(x, y, z);
      if (tree) return tree;

      return baseTypeAt(x, y, z);
    }

    function getSurfaceYAt(x, z) {
      for (let y = MAX_BUILD_HEIGHT; y >= -8; y--) {
        if (getBlockType(x, y, z)) return y + 0.5;
      }
      return 0.5;
    }

    const FACE_DEFS = [
      {
        normal: [1, 0, 0],
        corners: [
          [0.5, -0.5, -0.5],
          [0.5,  0.5, -0.5],
          [0.5,  0.5,  0.5],
          [0.5, -0.5,  0.5]
        ]
      },
      {
        normal: [-1, 0, 0],
        corners: [
          [-0.5, -0.5,  0.5],
          [-0.5,  0.5,  0.5],
          [-0.5,  0.5, -0.5],
          [-0.5, -0.5, -0.5]
        ]
      },
      {
        normal: [0, 1, 0],
        corners: [
          [-0.5, 0.5,  0.5],
          [ 0.5, 0.5,  0.5],
          [ 0.5, 0.5, -0.5],
          [-0.5, 0.5, -0.5]
        ]
      },
      {
        normal: [0, -1, 0],
        corners: [
          [-0.5, -0.5, -0.5],
          [ 0.5, -0.5, -0.5],
          [ 0.5, -0.5,  0.5],
          [-0.5, -0.5,  0.5]
        ]
      },
      {
        normal: [0, 0, 1],
        corners: [
          [ 0.5, -0.5, 0.5],
          [ 0.5,  0.5, 0.5],
          [-0.5,  0.5, 0.5],
          [-0.5, -0.5, 0.5]
        ]
      },
      {
        normal: [0, 0, -1],
        corners: [
          [-0.5, -0.5, -0.5],
          [-0.5,  0.5, -0.5],
          [ 0.5,  0.5, -0.5],
          [ 0.5, -0.5, -0.5]
        ]
      }
    ];

    function buildChunkGeometry(cx, cz, type) {
      const positions = [];
      const normals = [];
      const uvs = [];
      const indices = [];
      const faceMap = [];

      const startX = cx * CHUNK_SIZE;
      const startZ = cz * CHUNK_SIZE;

      for (let lx = 0; lx < CHUNK_SIZE; lx++) {
        for (let lz = 0; lz < CHUNK_SIZE; lz++) {
          const gx = startX + lx;
          const gz = startZ + lz;

          for (let y = -8; y <= MAX_BUILD_HEIGHT; y++) {
            if (getBlockType(gx, y, gz) !== type) continue;

            for (const face of FACE_DEFS) {
              const nx = gx + face.normal[0];
              const ny = y + face.normal[1];
              const nz = gz + face.normal[2];

              if (getBlockType(nx, ny, nz)) continue; // 邻居存在，剔除该面

              const base = positions.length / 3;

              for (let i = 0; i < 4; i++) {
                const c = face.corners[i];
                positions.push(gx + c[0], y + c[1], gz + c[2]);
                normals.push(face.normal[0], face.normal[1], face.normal[2]);
              }

              uvs.push(
                0, 0,
                1, 0,
                1, 1,
                0, 1
              );

              indices.push(
                base, base + 1, base + 2,
                base, base + 2, base + 3
              );

              faceMap.push({
                x: gx,
                y,
                z: gz,
                normal: face.normal
              });
            }
          }
        }
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
      geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
      if (indices.length > 0) geo.setIndex(indices);
      geo.computeBoundingSphere();
      geo.userData.faceMap = faceMap;
      return geo;
    }

    function loadChunk(cx, cz) {
      const ck = chunkKey(cx, cz);
      if (loadedChunks.has(ck)) return loadedChunks.get(ck);

      const group = new THREE.Group();
      const meshes = {};

      for (const type of BLOCK_TYPES) {
        const geo = buildChunkGeometry(cx, cz, type);
        const posAttr = geo.getAttribute('position');
        if (!posAttr || posAttr.count === 0) {
          geo.dispose();
          continue;
        }

        const mesh = new THREE.Mesh(geo, materials[type]);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData.type = type;
        group.add(mesh);
        meshes[type] = mesh;
      }

      scene.add(group);
      const chunk = { cx, cz, group, meshes };
      loadedChunks.set(ck, chunk);
      return chunk;
    }

    function unloadChunk(cx, cz) {
      const ck = chunkKey(cx, cz);
      const chunk = loadedChunks.get(ck);
      if (!chunk) return;

      scene.remove(chunk.group);
      chunk.group.traverse(obj => {
        if (obj.isMesh && obj.geometry) obj.geometry.dispose();
      });
      loadedChunks.delete(ck);
    }

    function ensureChunksAroundPlayer() {
      const pcx = Math.floor(camera.position.x / CHUNK_SIZE);
      const pcz = Math.floor(camera.position.z / CHUNK_SIZE);

      const keep = new Set();

      for (let dx = -LOAD_RADIUS; dx <= LOAD_RADIUS; dx++) {
        for (let dz = -LOAD_RADIUS; dz <= LOAD_RADIUS; dz++) {
          const cx = pcx + dx;
          const cz = pcz + dz;
          keep.add(chunkKey(cx, cz));
          loadChunk(cx, cz);
        }
      }

      for (const ck of [...loadedChunks.keys()]) {
        if (!keep.has(ck)) {
          const [cx, cz] = ck.split('|').map(Number);
          unloadChunk(cx, cz);
        }
      }
    }

    function rebuildChunk(cx, cz) {
      unloadChunk(cx, cz);
      loadChunk(cx, cz);
    }

    function rebuildAffectedChunksByBlock(x, z) {
      const { cx, cz } = blockToChunkCoord(x, z);
      const localX = ((x % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
      const localZ = ((z % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;

      const targets = new Set();
      targets.add(chunkKey(cx, cz));

      if (localX === 0) targets.add(chunkKey(cx - 1, cz));
      if (localX === CHUNK_SIZE - 1) targets.add(chunkKey(cx + 1, cz));
      if (localZ === 0) targets.add(chunkKey(cx, cz - 1));
      if (localZ === CHUNK_SIZE - 1) targets.add(chunkKey(cx, cz + 1));

      for (const ck of targets) {
        const [tx, tz] = ck.split('|').map(Number);
        rebuildChunk(tx, tz);
      }
    }

    // =========================
    // 存档
    // =========================
    function saveGame() {
      const data = {
        hotbar: hotbar.map(cloneSlot),
        inventory: inventory.map(cloneSlot),
        selectedSlot,
        edits: [...WORLD_EDIT.entries()],
        camera: {
          x: camera.position.x,
          y: camera.position.y,
          z: camera.position.z
        },
        rotation: {
          yaw,
          pitch
        }
      };

      localStorage.setItem(SAVE_KEY, JSON.stringify(data));
      refreshUI();
    }

    function loadGame() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) {
        ensureStarterItems();
        return;
      }

      try {
        const data = JSON.parse(raw);

        if (Array.isArray(data.hotbar) && data.hotbar.length === HOTBAR_SIZE) {
          hotbar = data.hotbar.map(normalizeSlot);
        }

        if (Array.isArray(data.inventory) && data.inventory.length === INVENTORY_SIZE) {
          inventory = data.inventory.map(normalizeSlot);
        }

        selectedSlot = typeof data.selectedSlot === 'number'
          ? Math.max(0, Math.min(HOTBAR_SIZE - 1, data.selectedSlot))
          : 0;

        WORLD_EDIT.clear();
        if (Array.isArray(data.edits)) {
          for (const [k, v] of data.edits) {
            WORLD_EDIT.set(k, v);
          }
        }

        if (data.camera) {
          camera.position.set(data.camera.x, data.camera.y, data.camera.z);
        }

        if (data.rotation) {
          yaw = data.rotation.yaw || 0;
          pitch = data.rotation.pitch || 0;
          camera.rotation.set(pitch, yaw, 0, 'YXZ');
        }
      } catch (err) {
        console.warn('读取存档失败：', err);
        ensureStarterItems();
      }
    }

    // =========================
    // UI
    // =========================
    const hotbarEl = document.getElementById('hotbar');
    const currentSlotInfoEl = document.getElementById('currentSlotInfo');
    const inventoryInfoEl = document.getElementById('inventoryInfo');
    const inventoryPanelEl = document.getElementById('inventoryPanel');
    const inventoryHotbarEl = document.getElementById('inventoryHotbar');
    const inventoryGridEl = document.getElementById('inventoryGrid');
    const crosshairEl = document.getElementById('crosshair');
    const startEl = document.getElementById('start');

    let inventoryOpen = false;
    let isLocked = false;
    let dragSource = null;

    function makeSlotEl(section, index) {
      const el = document.createElement('div');
      el.className = 'slot';
      el.draggable = true;
      el.dataset.section = section;
      el.dataset.index = String(index);
      el.innerHTML = `<div class="type"></div><div class="count"></div>`;

      el.addEventListener('dragstart', (e) => {
        dragSource = { section, index };
        e.dataTransfer.setData('text/plain', `${section}:${index}`);
        e.dataTransfer.effectAllowed = 'move';
        el.classList.add('dragging');
      });

      el.addEventListener('dragend', () => {
        dragSource = null;
        el.classList.remove('dragging');
      });

      el.addEventListener('dragover', (e) => {
        e.preventDefault();
      });

      el.addEventListener('drop', (e) => {
        e.preventDefault();
        if (!dragSource) return;
        moveSlot(dragSource, { section, index });
        saveGame();
        renderAllUI();
      });

      el.addEventListener('click', () => {
        if (section === 'hotbar' && !inventoryOpen) {
          selectedSlot = index;
          saveGame();
          renderAllUI();
        }
      });

      return el;
    }

    const bottomHotbarSlots = [];
    for (let i = 0; i < HOTBAR_SIZE; i++) {
      const el = makeSlotEl('hotbar', i);
      hotbarEl.appendChild(el);
      bottomHotbarSlots.push(el);
    }

    const panelHotbarSlots = [];
    for (let i = 0; i < HOTBAR_SIZE; i++) {
      const el = makeSlotEl('hotbar', i);
      inventoryHotbarEl.appendChild(el);
      panelHotbarSlots.push(el);
    }

    const inventorySlots = [];
    for (let i = 0; i < INVENTORY_SIZE; i++) {
      const el = makeSlotEl('inventory', i);
      inventoryGridEl.appendChild(el);
      inventorySlots.push(el);
    }

    function renderSlotEl(el, slot, isSelected = false) {
      el.classList.toggle('selected', isSelected);
      el.querySelector('.type').textContent = slot.type ? slot.type : '';
      el.querySelector('.count').textContent = slot.count > 0 ? String(slot.count) : '';
    }

    function renderAllUI() {
      for (let i = 0; i < HOTBAR_SIZE; i++) {
        const slot = hotbar[i];
        renderSlotEl(bottomHotbarSlots[i], slot, i === selectedSlot);
        renderSlotEl(panelHotbarSlots[i], slot, i === selectedSlot);
      }

      for (let i = 0; i < INVENTORY_SIZE; i++) {
        renderSlotEl(inventorySlots[i], inventory[i], false);
      }

      const current = hotbar[selectedSlot];
      currentSlotInfoEl.textContent = current.type ? `${current.type} × ${current.count}` : '空';
      inventoryInfoEl.textContent = `${occupiedCount(inventory)}/${INVENTORY_SIZE}`;

      inventoryPanelEl.style.display = inventoryOpen ? 'block' : 'none';
      crosshairEl.style.display = inventoryOpen ? 'none' : 'block';
    }

    function refreshUI() {
      renderAllUI();
    }

    function selectSlot(index) {
      selectedSlot = Math.max(0, Math.min(HOTBAR_SIZE - 1, index));
      saveGame();
      renderAllUI();
    }

    function toggleInventory() {
      inventoryOpen = !inventoryOpen;

      if (inventoryOpen && document.pointerLockElement) {
        document.exitPointerLock();
      }

      renderAllUI();
    }

    // =========================
    // 第一人称控制
    // =========================
    let yaw = 0;
    let pitch = 0;

    const moveState = {
      forward: false,
      backward: false,
      left: false,
      right: false,
      jump: false
    };

    const clock = new THREE.Clock();
    const eyeHeight = 1.6;
    let velocityY = 0;
    let onGround = false;

    startEl.addEventListener('click', () => {
      document.body.requestPointerLock();
    });

    document.addEventListener('pointerlockchange', () => {
      isLocked = document.pointerLockElement === document.body;
      if (!inventoryOpen) {
        startEl.style.display = isLocked ? 'none' : 'flex';
      } else {
        startEl.style.display = 'none';
      }
      renderAllUI();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isLocked || inventoryOpen) return;
      yaw -= e.movementX * 0.0022;
      pitch -= e.movementY * 0.0022;
      pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
      camera.rotation.set(pitch, yaw, 0, 'YXZ');
    });

    document.addEventListener('keydown', (e) => {
      if (e.code === 'KeyE') {
        toggleInventory();
        return;
      }

      if (inventoryOpen) return;

      if (e.code === 'KeyW') moveState.forward = true;
      if (e.code === 'KeyS') moveState.backward = true;
      if (e.code === 'KeyA') moveState.left = true;
      if (e.code === 'KeyD') moveState.right = true;
      if (e.code === 'Space') moveState.jump = true;

      if (e.code === 'Digit1') selectSlot(0);
      if (e.code === 'Digit2') selectSlot(1);
      if (e.code === 'Digit3') selectSlot(2);
      if (e.code === 'Digit4') selectSlot(3);
      if (e.code === 'Digit5') selectSlot(4);
      if (e.code === 'Digit6') selectSlot(5);
      if (e.code === 'Digit7') selectSlot(6);
      if (e.code === 'Digit8') selectSlot(7);
      if (e.code === 'Digit9') selectSlot(8);
    });

    document.addEventListener('keyup', (e) => {
      if (e.code === 'KeyW') moveState.forward = false;
      if (e.code === 'KeyS') moveState.backward = false;
      if (e.code === 'KeyA') moveState.left = false;
      if (e.code === 'KeyD') moveState.right = false;
      if (e.code === 'Space') moveState.jump = false;
    });

    document.addEventListener('wheel', (e) => {
      if (!isLocked || inventoryOpen) return;
      if (e.deltaY > 0) selectSlot((selectedSlot + 1) % HOTBAR_SIZE);
      else selectSlot((selectedSlot + HOTBAR_SIZE - 1) % HOTBAR_SIZE);
    }, { passive: true });

    // =========================
    // 鼠标破坏 / 放置
    // =========================
    function getAimHit() {
      raycaster.setFromCamera({ x: 0, y: 0 }, camera);

      const targets = [];
      for (const chunk of loadedChunks.values()) {
        for (const mesh of Object.values(chunk.meshes)) {
          targets.push(mesh);
        }
      }

      const hits = raycaster.intersectObjects(targets, false);
      return hits.length ? hits[0] : null;
    }

    function getFaceMapEntry(hit) {
      const mesh = hit.object;
      const map = mesh?.geometry?.userData?.faceMap;
      if (!map) return null;
      return map[Math.floor(hit.faceIndex / 2)] || null;
    }

    function destroyBlock() {
      const hit = getAimHit();
      if (!hit) return;

      const faceInfo = getFaceMapEntry(hit);
      if (!faceInfo) return;

      const { x, y, z } = faceInfo;
      const blockType = getBlockType(x, y, z);
      if (!blockType) return;

      WORLD_EDIT.set(key3(x, y, z), null);
      addItem(blockType, 1);
      rebuildAffectedChunksByBlock(x, z);
      saveGame();
    }

    function placeBlock() {
      const selected = selectedItemType();
      if (!selected) return;

      const hit = getAimHit();
      if (!hit) return;

      const faceInfo = getFaceMapEntry(hit);
      if (!faceInfo) return;

      const [nx, ny, nz] = hit.face.normal.toArray();
      const px = faceInfo.x + nx;
      const py = faceInfo.y + ny;
      const pz = faceInfo.z + nz;

      if (getBlockType(px, py, pz)) return;

      const consumed = consumeSelectedItem();
      if (!consumed) return;

      WORLD_EDIT.set(key3(px, py, pz), selected);
      rebuildAffectedChunksByBlock(px, pz);
      saveGame();
    }

    document.addEventListener('mousedown', (e) => {
      if (inventoryOpen) return;

      if (!isLocked) {
        document.body.requestPointerLock();
        return;
      }

      if (e.button === 0) destroyBlock();
      if (e.button === 2) placeBlock();
    });

    // =========================
    // 初始化
    // =========================
    loadGame();
    ensureStarterItems();

    if (!localStorage.getItem(SAVE_KEY)) {
      const surface = getSurfaceYAt(0, 0);
      camera.position.set(0, surface + eyeHeight + 2, 12);
      yaw = 0;
      pitch = 0;
      camera.rotation.set(pitch, yaw, 0, 'YXZ');
    }

    renderAllUI();
    ensureChunksAroundPlayer();
    saveGame();

    // =========================
    // 游戏循环
    // =========================
    let streamTimer = 0;

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);

      // 天空始终包裹玩家
      skyDome.position.copy(camera.position);
      sunMesh.position.copy(camera.position).add(new THREE.Vector3(60, 80, -40));

      if (!inventoryOpen) {
        streamTimer += dt;
        if (streamTimer > 0.18) {
          ensureChunksAroundPlayer();
          streamTimer = 0;
        }

        const speed = 7;
        const forward = new THREE.Vector3();
        camera.getWorldDirection(forward);
        forward.y = 0;
        forward.normalize();

        const right = new THREE.Vector3()
          .crossVectors(forward, new THREE.Vector3(0, 1, 0))
          .normalize();

        const moveDir = new THREE.Vector3();
        if (moveState.forward) moveDir.add(forward);
        if (moveState.backward) moveDir.sub(forward);
        if (moveState.left) moveDir.sub(right);
        if (moveState.right) moveDir.add(right);

        if (moveDir.lengthSq() > 0) {
          moveDir.normalize();
          camera.position.addScaledVector(moveDir, speed * dt);
        }

        const gravity = 18;
        if (moveState.jump && onGround) {
          velocityY = 7.8;
          onGround = false;
        }

        velocityY -= gravity * dt;
        camera.position.y += velocityY * dt;

        const x = Math.round(camera.position.x);
        const z = Math.round(camera.position.z);
        const groundSurface = getSurfaceYAt(x, z);

        if (camera.position.y <= groundSurface + eyeHeight) {
          camera.position.y = groundSurface + eyeHeight;
          velocityY = 0;
          onGround = true;
        } else {
          onGround = false;
        }
      }

      renderAllUI();
      renderer.render(scene, camera);
    }

    animate();

    // =========================
    // 自适应窗口
    // =========================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener('beforeunload', saveGame);
  </script>
</body>
</html>
